services:
  app:
    build: .
    container_name: remarcal
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/remarcal:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - REMARKABLE_HOST=${REMARKABLE_HOST}
      - REMARKABLE_USER=${REMARKABLE_USER}
      - REMARKABLE_PASSWORD=${REMARKABLE_PASSWORD}
      - SYNC_DRY_RUN=${SYNC_DRY_RUN:-false}
      - SYNC_BACKUP_REMOTE=${SYNC_BACKUP_REMOTE:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
       - "synology-ds423.tail0c48d8.ts.net:10.10.220.254"

volumes:
  remarcal_data: