services:
  app:
    build: .
    container_name: remarcal
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/remarcal:/data
      - /tmp:/tmp
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - DATA_DIR=${DATA_DIR:-/data}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - APP_ALLOWED_ORIGIN=${APP_ALLOWED_ORIGIN}
      - APP_SECURE_COOKIES=${APP_SECURE_COOKIES:-false}
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - SYNC_DRY_RUN=${SYNC_DRY_RUN:-false}
      - SYNC_BACKUP_REMOTE=${SYNC_BACKUP_REMOTE:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
       - "${CALDAV_HOSTNAME:-nas.local}:${CALDAV_HOST_IP:-192.168.1.10}"

volumes:
  remarcal_data:
