services:
  app:
    image: ghcr.io/cookie-monster1649/remarcal-move:latest
    container_name: remarcal-move
    user: 1000:100
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/remarcal:/data
      - /tmp:/tmp
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATA_DIR=${DATA_DIR:-/data}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - APP_ALLOWED_ORIGIN=${APP_ALLOWED_ORIGIN}
      - APP_SECURE_COOKIES=${APP_SECURE_COOKIES:-false}
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - CALENDAR_TRACE=${CALENDAR_TRACE:-0}
      - CAL_TRACE_INGEST=${CAL_TRACE_INGEST:-0}
      - CAL_TRACE_SYNC=${CAL_TRACE_SYNC:-0}
      - CAL_TRACE_PDF=${CAL_TRACE_PDF:-0}
      - CAL_TRACE_TZ_FALLBACK=${CAL_TRACE_TZ_FALLBACK:-0}
      - CAL_TRACE_LIMIT=${CAL_TRACE_LIMIT:-80}
      - CAL_TRACE_DAY=${CAL_TRACE_DAY:-}
      - SYNC_DRY_RUN=${SYNC_DRY_RUN:-false}
      - SYNC_BACKUP_REMOTE=${SYNC_BACKUP_REMOTE:-true}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_MAX_COUNT=${BACKUP_MAX_COUNT:-5}
      - BACKUP_MAX_TOTAL_SIZE_GB=${BACKUP_MAX_TOTAL_SIZE_GB:-5}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
       - "${CALDAV_HOSTNAME:-nas.local}:${CALDAV_HOST_IP:-192.168.1.10}"
