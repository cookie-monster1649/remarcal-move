services:
  app:
    build: .
    container_name: remarcal
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/remarcal:/data
      # Optional: Mount SSH key if using key-based auth. 
      # If using password auth, you can comment this out or leave it (it will just be an empty mount if file missing on host, which might cause issues, so best to be explicit).
      # For now, we'll keep it but users should ensure the file exists or remove this line.
      # - ./ssh_key:/app/ssh_key:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - REMARKABLE_HOST=${REMARKABLE_HOST}
      - REMARKABLE_USER=${REMARKABLE_USER}
      - REMARKABLE_PASSWORD=${REMARKABLE_PASSWORD}
      # - REMARKABLE_SSH_KEY_PATH=${REMARKABLE_SSH_KEY_PATH:-/app/ssh_key}
      - SYNC_DRY_RUN=${SYNC_DRY_RUN:-false}
      - SYNC_BACKUP_REMOTE=${SYNC_BACKUP_REMOTE:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  remarcal_data:
