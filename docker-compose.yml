services:
  app:
    build: .
    container_name: remarcal
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/remarcal/data:/data
      - /DATA/AppData/remarcal/data/secrets:/run/secrets:ro
      - /tmp:/tmp
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - APP_ALLOWED_ORIGIN=${APP_ALLOWED_ORIGIN:-http://nuc.tail0c48d8.ts.net:3000}
      - APP_MASTER_KEY_FILE=${APP_MASTER_KEY_FILE:-/run/secrets/app_master_key}
      - APP_MASTER_KEY=${APP_MASTER_KEY}
      - SYNC_DRY_RUN=${SYNC_DRY_RUN:-false}
      - SYNC_BACKUP_REMOTE=${SYNC_BACKUP_REMOTE:-true}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
       - "synology-ds423.tail0c48d8.ts.net:10.10.220.254"

volumes:
  remarcal_data:
